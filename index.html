// ─── STORAGE ──────────────────────────────────────────────────────
const STORAGE_KEY = "smfa_v5";

// ─── CLOUD SYNC ───────────────────────────────────────────────────
// Uses JSONBin.io — free, no account or signup needed.
// On first activation a bin is auto-created and its ID saved to
// localStorage so every future push/pull uses the same bin.
//
// HOW IT WORKS:
//   Admin clicks "Activate" → bin created → ID stored locally
//   Every admin change → data pushed to that bin (debounced 1.5s)
//   Viewers opening the shared link → pull latest data every 30s

const JSONBIN_API  = "https://api.jsonbin.io/v3/b";
const CLOUD_KEY_STORAGE = "smfa_bin_id";   // localStorage key holding the bin ID
const CLOUD_READY_KEY   = "smfa_cloud_ok"; // flag: "1" once first push succeeds

function getCloudReady() {
  try { return localStorage.getItem(CLOUD_READY_KEY) === "1"; } catch { return false; }
}
function setCloudReady() {
  try { localStorage.setItem(CLOUD_READY_KEY, "1"); } catch {}
}
function getBinId() {
  try { return localStorage.getItem(CLOUD_KEY_STORAGE) || null; } catch { return null; }
}
function saveBinId(id) {
  try { localStorage.setItem(CLOUD_KEY_STORAGE, id); } catch {}
}

function slimData(data) {
  const slim = JSON.parse(JSON.stringify(data));
  const sizeLimit = 80000;
  if (slim.assocLogo && slim.assocLogo.length > sizeLimit) slim.assocLogo = null;
  if (slim.teams) slim.teams = slim.teams.map(t => t.logo && t.logo.length > sizeLimit ? {...t, logo: null} : t);
  if (slim.players) {
    Object.keys(slim.players).forEach(k => {
      slim.players[k] = slim.players[k].map(p => p.photo && p.photo.length > sizeLimit ? {...p, photo: null} : p);
    });
  }
  return slim;
}

async function cloudPush(data, apiKey) {
  try {
    const payload = { ...slimData(data), _updated: Date.now() };
    let binId = getBinId();
    // Retrieve saved key if not passed
    const key = apiKey || (()=>{ try { return localStorage.getItem("smfa_api_key") || ""; } catch { return ""; } })();

    if (!binId) {
      // First time — create a new public bin
      const createHeaders = { "Content-Type": "application/json", "X-Bin-Private": "false", "X-Bin-Name": "SMFA-League" };
      if (key) createHeaders["X-Master-Key"] = key;
      const res = await fetch(JSONBIN_API, {
        method: "POST",
        headers: createHeaders,
        body: JSON.stringify(payload)
      });
      if (!res.ok) { const e = await res.text().catch(()=>"?"); console.error("JSONBin create failed:", res.status, e); return false; }
      const json = await res.json();
      binId = json.metadata?.id;
      if (!binId) { console.error("JSONBin: no id in response", json); return false; }
      saveBinId(binId);
    } else {
      // Update existing bin
      const res = await fetch(`${JSONBIN_API}/${binId}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      if (!res.ok) { const e = await res.text().catch(()=>"?"); console.error("JSONBin update failed:", res.status, e); return false; }
    }

    setCloudReady();
    return true;
  } catch { return false; }
}

async function cloudPull() {
  try {
    // Viewers get the bin ID from the URL; admins use the one saved in localStorage
    const urlBin = (new URLSearchParams(window.location.search)).get("bin");
    const binId = urlBin || getBinId();
    if (!binId) return null;
    // If viewer brought a different bin ID, save it so auto-refresh keeps working
    if (urlBin && !getBinId()) saveBinId(urlBin);
    const res = await fetch(`${JSONBIN_API}/${binId}/latest`);
    if (!res.ok) return null;
    const json = await res.json();
    return json.record || null;
  } catch { return null; }
}

const getPublicLink = () => {
  const binId = getBinId();
  return "https://suhum.myfootballconsole.com/?view=suhum" + (binId ? "&bin=" + binId : "");
};

}

}

const readFile = (file, cb) => { const r = new FileReader(); r.onload = e => cb(e.target.result); r.readAsDataURL(file); };
const initials = (name, n=2) => name ? name.split(" ").map(w=>w[0]).join("").slice(0,n).toUpperCase() : "?";
const pickFile = (accept, cb) => { const inp = document.createElement("input"); inp.type="file"; inp.accept=accept; inp.onchange=e=>{const f=e.target.files[0];if(f)readFile(f,cb);}; inp.click(); };

  return <div style={{width:size,height:size,borderRadius:8,background:color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*.24,fontWeight:900,color:"#fff",fontFamily:"'Bebas Neue',sans-serif",letterSpacing:1,border:"2px solid rgba(255,255,255,0.15)",flexShrink:0}}>{initials(name,3)}</div>;
};

const PlayerAvatar = ({photo, name, color="#16a34a", size=52}) => {
  if (photo) return <img src={photo} alt={name} style={{width:size,height:size,borderRadius:"50%",objectFit:"cover",border:`2.5px solid ${color}`,flexShrink:0}}/>;
  return <div style={{width:size,height:size,borderRadius:"50%",background:`linear-gradient(135deg,${color}44,${color}99)`,border:`2.5px solid ${color}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*.3,fontWeight:900,color:"#fff",fontFamily:"'Bebas Neue',sans-serif",flexShrink:0}}>{initials(name)}</div>;
};

// ─── MAIN ────────────────────────────────────────────────────────
function App() {
  const saved = loadData();

  // ── Auth
  const [isAdmin,       setIsAdmin]       = useState(false);
  const [adminPw,       setAdminPw]       = useState(saved.adminPassword || "0000");
  const [loginInput,    setLoginInput]    = useState("");
  const [loginErr,      setLoginErr]      = useState("");
  const [showLogin,     setShowLogin]     = useState(false);
  const [showPwChange,  setShowPwChange]  = useState(false);
  const [pwNew,         setPwNew]         = useState("");
  const [pwConfirm,     setPwConfirm]     = useState("");
  const [pwErr,         setPwErr]         = useState("");

  // ── Assoc identity
  const [assocName,   setAssocName]   = useState(saved.assocName   || "Suhum Municipal Football Association");
  const [assocSeason, setAssocSeason] = useState(saved.assocSeason || "2025/26");
  const [assocLogo,   setAssocLogo]   = useState(saved.assocLogo   || null);
  const [modalAssoc,  setModalAssoc]  = useState(false);

  // ── Data
  const [teams,   setTeams]   = useState(saved.teams);
  const [stats,   setStats]   = useState(saved.stats);
  const [players, setPlayers] = useState(saved.players);
  const [matches, setMatches] = useState(saved.matches);
  const [scorers, setScorers] = useState(saved.scorers);

  // ── UI
  const [tab,          setTab]          = useState("table");
  const [editSection,  setEditSection]  = useState("teams");
  const [notify,       setNotify]       = useState(null);
  const [printTeamId,  setPrintTeamId]  = useState(teams[0]?.id || null);
  const [printMode,    setPrintMode]    = useState("cards");

  // ── Modals
  const [modalAddTeam,    setModalAddTeam]    = useState(false);
  const [modalEditTeam,   setModalEditTeam]   = useState(null);  // team obj
  const [modalAddPlayer,  setModalAddPlayer]  = useState(false);
  const [modalAddMatch,   setModalAddMatch]   = useState(false);
  const [modalAddScorer,  setModalAddScorer]  = useState(false);
  const [modalShare,      setModalShare]      = useState(false);
  const [modalEditPlayer, setModalEditPlayer] = useState(null);

  // ── Form state
  const [selTeamId,   setSelTeamId]   = useState(teams[0]?.id);
  const [newTeam,     setNewTeam]     = useState({name:"",shortName:"",color:"#16a34a",logo:null});
  const [newPlayer,   setNewPlayer]   = useState({name:"",age:"",position:"Midfielder",photo:null});
  const [newMatch,    setNewMatch]    = useState({homeTeamId:teams[0]?.id,awayTeamId:teams[1]?.id,homeScore:"",awayScore:"",date:"",round:""});
  const [newScorer,   setNewScorer]   = useState({teamId:teams[0]?.id,playerName:"",goals:0,assists:0,yellowCards:0,redCards:0});
  const [matchFilter, setMatchFilter] = useState("all");
  const [scorerSort,  setScorerSort]  = useState("goals");
  const [copyOk,      setCopyOk]      = useState(false);

  // ── Lineup
  const [luTeamId, setLuTeamId] = useState(teams[0]?.id);
  const [luForm,   setLuForm]   = useState("4-3-3");
  const [lineup,   setLineup]   = useState({});

  // ── Persist locally
  useEffect(() => { saveData({adminPassword:adminPw,assocName,assocSeason,assocLogo,teams,stats,players,matches,scorers}); }, [adminPw,assocName,assocSeason,assocLogo,teams,stats,players,matches,scorers]);

  const toast = (msg, type="ok") => { setNotify({msg,type}); setTimeout(()=>setNotify(null),3000); };

  // ── Cloud sync state
  const urlParams  = typeof window !== "undefined" ? new URLSearchParams(window.location.search) : null;
  const viewKey    = urlParams ? (urlParams.get("view") || urlParams.get("share")) : null;
  const isViewer   = !!viewKey;
  const [cloudStatus,      setCloudStatus]      = useState("idle");
  const [cloudReady,       setCloudReady_state] = useState(() => getCloudReady());
  const [modalCloudSetup,  setModalCloudSetup]  = useState(false);
  const [cloudSetupStep,   setCloudSetupStep]   = useState("idle"); // idle | pushing | done | fail
  const [cloudApiKey,      setCloudApiKey]      = useState(() => { try { return localStorage.getItem("smfa_api_key") || ""; } catch { return ""; } });
  const [cloudBinId,       setCloudBinId]       = useState(() => getBinId());

  // Helper to load cloud data into state
  const applyCloudData = (d) => {
    if (!d || typeof d !== "object") return;
    if (d.assocName)   setAssocName(d.assocName);
    if (d.assocSeason) setAssocSeason(d.assocSeason);
    if (d.assocLogo)   setAssocLogo(d.assocLogo);
    if (d.teams)       setTeams(d.teams);
    if (d.stats)       setStats(d.stats);
    if (d.players)     setPlayers(d.players);
    if (d.matches)     setMatches(d.matches);
    if (d.scorers)     setScorers(d.scorers);
  };

  // Viewer: load from Firebase on open
  useEffect(() => {
    if (!isViewer) return;
    setCloudStatus("syncing");
    cloudPull().then(d => {
      if (!d) { setCloudStatus("error"); return; }
      applyCloudData(d);
      setCloudStatus("synced");
    });
  }, []);

  // Viewer: auto-refresh every 30s
  useEffect(() => {
    if (!isViewer) return;
    const interval = setInterval(() => {
      cloudPull().then(d => {
        if (!d) return;
        applyCloudData(d);
        setCloudStatus("synced");
      });
    }, 30000);
    return () => clearInterval(interval);
  }, [isViewer]);

  // Admin: auto-push to Firebase on any data change (debounced 1.5s)
  useEffect(() => {
    if (!isAdmin || isViewer || !cloudReady) return;
    setCloudStatus("syncing");
    const t = setTimeout(() => {
      cloudPush({assocName,assocSeason,assocLogo,teams,stats,players,matches,scorers})
        .then(ok => setCloudStatus(ok ? "synced" : "error"));
    }, 1500);
    return () => clearTimeout(t);
  }, [adminPw,assocName,assocSeason,assocLogo,teams,stats,players,matches,scorers,isAdmin,cloudReady]);

  // First-time cloud activation
  const doCloudActivate = async () => {
    setCloudSetupStep("creating");
    // Save API key to localStorage for future updates
    try { if (cloudApiKey) localStorage.setItem("smfa_api_key", cloudApiKey); } catch {}
    const ok = await cloudPush({assocName,assocSeason,assocLogo,teams,stats,players,matches,scorers}, cloudApiKey);
    if (ok) {
      setCloudReady_state(true);
      setCloudStatus("synced");
      setCloudSetupStep("done");
      setCloudBinId(getBinId());
    } else {
      setCloudSetupStep("fail");
    }
  };

  const doShare = () => {
    const link = getPublicLink();
    const msg = "⚽ Live league table – " + assocName + " " + assocSeason;
    if (navigator.share) {
      navigator.share({title: assocName + " League", text: msg, url: link}).catch(()=>{});
    } else {
      navigator.clipboard.writeText(link).then(()=>{setCopyOk(true);setTimeout(()=>setCopyOk(false),3000);});
    }
  };
  const copyLink = () => {
    navigator.clipboard.writeText(getPublicLink()).then(()=>{setCopyOk(true);setTimeout(()=>setCopyOk(false),3000);});
  };

  // ── Auth
  const doLogin = () => {
    if (loginInput === adminPw) { setIsAdmin(true); setShowLogin(false); setLoginInput(""); setLoginErr(""); toast("Admin mode activated"); }
    else setLoginErr("Wrong password.");
  };
  const doChangePw = () => {
    if (!pwNew) return setPwErr("Password cannot be empty.");
    if (pwNew !== pwConfirm) return setPwErr("Passwords don't match.");
    setAdminPw(pwNew); setPwNew(""); setPwConfirm(""); setPwErr(""); setShowPwChange(false); toast("Password changed!");
  };

  // ── League table
  const table = [...teams].map(t => {
    const s = stats[t.id] || {played:0,won:0,drawn:0,lost:0,goalsFor:0,goalsAgainst:0,pointsDeducted:0};
    return {...t,...s, pts:s.won*3+s.drawn-(s.pointsDeducted||0), gd:s.goalsFor-s.goalsAgainst};
  }).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.goalsFor-a.goalsFor);

  // ── CRUD
  const addTeam = () => {
    if (!newTeam.name||!newTeam.shortName) return toast("Fill team name & short name","err");
    const id = Date.now();
    setTeams(p=>[...p,{...newTeam,id}]);
    setStats(p=>({...p,[id]:{played:0,won:0,drawn:0,lost:0,goalsFor:0,goalsAgainst:0,pointsDeducted:0}}));
    setPlayers(p=>({...p,[id]:[]}));
    setNewTeam({name:"",shortName:"",color:"#16a34a",logo:null}); setModalAddTeam(false); toast(`${newTeam.name} added!`);
  };
  const updateTeam = (id, patch) => setTeams(p=>p.map(t=>t.id===id?{...t,...patch}:t));
  const saveEditTeam = () => {
    if (!modalEditTeam.name||!modalEditTeam.shortName) return toast("Fill name & short name","err");
    updateTeam(modalEditTeam.id, modalEditTeam);
    setModalEditTeam(null); toast("Team updated!");
  };
  const removeTeam = id => {
    setTeams(p=>p.filter(t=>t.id!==id));
    setStats(p=>{const n={...p};delete n[id];return n;});
    setPlayers(p=>{const n={...p};delete n[id];return n;});
    setMatches(p=>p.filter(m=>m.homeTeamId!==id&&m.awayTeamId!==id));
    toast("Team removed.");
  };

  const addPlayer = () => {
    if (!newPlayer.name||!newPlayer.age) return toast("Fill name & age","err");
    const id = Date.now();
    setPlayers(p=>({...p,[selTeamId]:[...(p[selTeamId]||[]),{...newPlayer,id,age:+newPlayer.age}]}));
    setNewPlayer({name:"",age:"",position:"Midfielder",photo:null}); setModalAddPlayer(false); toast(`${newPlayer.name} registered!`);
  };
  const updatePlayer = (teamId, playerId, patch) => setPlayers(p=>({...p,[teamId]:p[teamId].map(pl=>pl.id===playerId?{...pl,...patch}:pl)}));
  const removePlayer = (teamId, playerId) => { setPlayers(p=>({...p,[teamId]:p[teamId].filter(pl=>pl.id!==playerId)})); toast("Player removed."); };

  const addMatch = () => {
    if (!newMatch.date||+newMatch.homeTeamId===+newMatch.awayTeamId) return toast("Fill valid match details","err");
    const played = newMatch.homeScore!==""&&newMatch.awayScore!=="";
    setMatches(p=>[...p,{...newMatch,id:Date.now(),homeTeamId:+newMatch.homeTeamId,awayTeamId:+newMatch.awayTeamId,homeScore:played?+newMatch.homeScore:null,awayScore:played?+newMatch.awayScore:null,round:+newMatch.round||p.length+1,played}]);
    setNewMatch({homeTeamId:teams[0]?.id,awayTeamId:teams[1]?.id,homeScore:"",awayScore:"",date:"",round:""}); setModalAddMatch(false); toast("Match added!");
  };
  const removeMatch = id => { setMatches(p=>p.filter(m=>m.id!==id)); toast("Match removed."); };

  const addScorer = () => {
    if (!newScorer.playerName) return toast("Enter player name","err");
    setScorers(p=>[...p,{...newScorer,id:Date.now(),teamId:+newScorer.teamId,goals:+newScorer.goals,assists:+newScorer.assists,yellowCards:+newScorer.yellowCards,redCards:+newScorer.redCards}]);
    setNewScorer({teamId:teams[0]?.id,playerName:"",goals:0,assists:0,yellowCards:0,redCards:0}); setModalAddScorer(false); toast("Stats added!");
  };
  const removeScorer = id => { setScorers(p=>p.filter(s=>s.id!==id)); toast("Scorer removed."); };

  const assignSlot = (idx, pid) => setLineup(prev=>{
    const n={...prev};
    Object.keys(n).forEach(k=>{if(n[k]===pid)delete n[k];});
    if(pid) n[idx]=pid; else delete n[idx]; return n;
  });

  // ── Derived
  const luTeam     = teams.find(t=>t.id===luTeamId);
  const luPlayers  = players[luTeamId]||[];
  const fSlots     = FPOS[luForm]||[];
  const selTeam    = teams.find(t=>t.id===selTeamId);
  const selPlayers = players[selTeamId]||[];
  const filteredMatches = matches.filter(m=>matchFilter==="played"?m.played:matchFilter==="upcoming"?!m.played:true).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const sortedScorers   = [...scorers].sort((a,b)=>scorerSort==="goals"?b.goals-a.goals:scorerSort==="assists"?b.assists-a.assists:(b.yellowCards+b.redCards*3)-(a.yellowCards+a.redCards*3));

  // ─── Design tokens ────────────────────────────────────────────
  const C = {
    bg:"#080f0a", card:"#0c1a0e", border:"#1c3d22",
    green:"#22c55e", greenDim:"#16a34a", text:"#e2f4e8",
    muted:"#5a7a62", accent:"#facc15"
  };
  const css = {
    app:  {minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"'DM Sans',sans-serif",overflowX:"hidden"},
    hdr:  {background:"linear-gradient(135deg,#0c1f0f,#091408)",borderBottom:`1px solid ${C.border}`,padding:"0 20px",position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 24px #00000066"},
    hdrIn:{maxWidth:1280,margin:"0 auto",display:"flex",alignItems:"center",gap:12,padding:"11px 0",flexWrap:"wrap"},
    main: {maxWidth:1280,margin:"0 auto",padding:"24px 20px"},
    card: {background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:20,marginBottom:16},
    title:{fontFamily:"'Bebas Neue',sans-serif",fontSize:26,color:C.green,letterSpacing:3,marginBottom:4},
    sub:  {color:C.muted,fontSize:13,marginBottom:20},
    tbl:  {width:"100%",borderCollapse:"collapse",fontSize:14},
    th:   {padding:"10px 9px",fontFamily:"'Bebas Neue',sans-serif",fontSize:13,letterSpacing:2,color:C.green,textTransform:"uppercase",borderBottom:`2px solid ${C.border}`,textAlign:"center"},
    thL:  {padding:"10px 9px",fontFamily:"'Bebas Neue',sans-serif",fontSize:13,letterSpacing:2,color:C.green,textTransform:"uppercase",borderBottom:`2px solid ${C.border}`,textAlign:"left"},
    td:   {padding:"11px 9px",textAlign:"center",borderBottom:`1px solid ${C.border}55`,color:C.text,fontSize:13},
    tdL:  {padding:"11px 9px",textAlign:"left",borderBottom:`1px solid ${C.border}55`,color:C.text,fontSize:13},
    inp:  {width:"100%",padding:"10px 13px",background:"#0a160c",border:`1px solid ${C.border}`,borderRadius:8,color:C.text,fontSize:14,outline:"none",boxSizing:"border-box",fontFamily:"'DM Sans',sans-serif"},
    lbl:  {display:"block",fontSize:10,fontFamily:"'Bebas Neue',sans-serif",letterSpacing:1.5,color:C.green,textTransform:"uppercase",marginBottom:5},
    modal:{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:16,overflowY:"auto"},
    mbox: {background:"#0c1a0e",border:`1px solid ${C.border}`,borderRadius:16,padding:26,width:"100%",maxWidth:440,boxShadow:"0 24px 64px #00000099",margin:"auto"},
    ntf:  (t)=>({position:"fixed",bottom:24,right:24,padding:"11px 18px",borderRadius:10,zIndex:400,fontSize:13,fontWeight:600,boxShadow:"0 8px 24px #00000066",...(t==="err"?{background:"#450a0a",border:"1px solid #ef4444",color:"#fca5a5"}:{background:"#052e16",border:`1px solid ${C.green}`,color:C.green})}),
  };
  const btn = (v="p") => ({padding:"9px 18px",border:"none",cursor:"pointer",fontFamily:"'Bebas Neue',sans-serif",fontWeight:400,fontSize:14,letterSpacing:1.5,textTransform:"uppercase",borderRadius:8,transition:"all .18s",...(
    v==="p"  ?{background:`linear-gradient(135deg,${C.greenDim},#15803d)`,color:"#fff",boxShadow:`0 4px 14px ${C.greenDim}44`}:
    v==="g"  ?{background:"transparent",color:C.muted,border:`1px solid ${C.border}`}:
    v==="d"  ?{background:"transparent",color:"#ef4444",border:"1px solid #ef444455"}:
    v==="gold"?{background:"linear-gradient(135deg,#d97706,#92400e)",color:"#fff"}:
              {background:"transparent",color:C.green,border:`1px solid ${C.green}55`}
  )});
  const navBtn = (active) => ({padding:"7px 13px",borderRadius:7,border:"none",cursor:"pointer",fontFamily:"'Bebas Neue',sans-serif",fontSize:13,letterSpacing:1.5,textTransform:"uppercase",transition:"all .18s",background:active?C.greenDim:"transparent",color:active?"#fff":C.muted,boxShadow:active?`0 0 14px ${C.greenDim}55`:"none"});
  const pos3 = (i) => ({width:24,height:24,borderRadius:"50%",background:i===1?"#d97706":i===2?"#71717a":i===3?"#a16207":"#1c3d22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:900,color:"#fff",margin:"0 auto",fontFamily:"'Bebas Neue',sans-serif"});
  const tabPill = (active, color="#22c55e") => ({padding:"8px 14px",borderRadius:8,border:`1px solid ${active?color:C.border}`,cursor:"pointer",background:active?`${color}22`:"transparent",color:active?color:C.muted,fontFamily:"'Bebas Neue',sans-serif",fontSize:13,letterSpacing:1,transition:"all .18s",display:"flex",alignItems:"center",gap:6});

  // ════════════════════════════════════════════════════════════════
  return (
    <div style={css.app}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap');
        *{box-sizing:border-box;margin:0;padding:0;}
        ::-webkit-scrollbar{width:5px;} ::-webkit-scrollbar-track{background:#080f0a;} ::-webkit-scrollbar-thumb{background:#1c3d22;border-radius:4px;}
        input[type=color]{width:42px;height:34px;border-radius:6px;border:1px solid #1c3d22;background:none;cursor:pointer;padding:2px;}
        tr:hover td{background:rgba(34,197,94,.04);}
        .hov:hover{filter:brightness(1.12);transform:translateY(-1px);}
        .hov:active{transform:translateY(0);}
        @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
        select option{background:#0c1a0e;}
        .pill-active{background:#22c55e22!important;border-color:#22c55e!important;color:#22c55e!important;}
        .uploadzone{border:2px dashed #1c3d22;border-radius:10px;padding:16px;text-align:center;cursor:pointer;transition:all .2s;}
        .uploadzone:hover{border-color:#22c55e;background:#22c55e0a;}
        .edit-row:hover{background:#22c55e08!important;}
        .score-badge{padding:3px 9px;border-radius:20px;font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:1px;}
        .photo-hover:hover .photo-overlay{opacity:1!important;}
      `}</style>

      {/* VIEWER BANNER */}
      {isViewer && <div style={{background:"#052e16",borderBottom:`1px solid ${C.green}44`,padding:"6px 20px",textAlign:"center",fontSize:11,color:C.green,fontFamily:"'Bebas Neue',sans-serif",letterSpacing:2,display:"flex",alignItems:"center",justifyContent:"center",gap:10,flexWrap:"wrap"}}>
        👁 LIVE VIEW — {assocName}
        {cloudStatus==="syncing" && <span style={{color:C.accent}}>⏳ Loading…</span>}
        {cloudStatus==="synced"  && <span style={{color:"#4ade80"}}>🟢 Live & Up to Date</span>}
        {cloudStatus==="error"   && <span style={{color:"#f87171"}}>⚠️ Offline – showing cached data</span>}
        <button onClick={()=>{ setCloudStatus("syncing"); cloudPull().then(d=>{ if(d){applyCloudData(d);setCloudStatus("synced");} else setCloudStatus("error"); }); }} style={{background:"transparent",border:`1px solid ${C.green}44`,borderRadius:5,color:C.green,fontSize:10,padding:"2px 8px",cursor:"pointer",fontFamily:"'Bebas Neue',sans-serif",letterSpacing:1}}>🔄 REFRESH</button>
      </div>}
      {isAdmin && !isViewer && <div style={{background:"#0f2d17",borderBottom:`1px solid ${C.greenDim}`,padding:"5px 20px",textAlign:"center",fontSize:11,color:"#86efac",fontFamily:"'Bebas Neue',sans-serif",letterSpacing:2,display:"flex",alignItems:"center",justifyContent:"center",gap:10,flexWrap:"wrap"}}>
        🔐 ADMIN MODE
        {!cloudReady && <><span style={{color:"#fb923c"}}>⚠️ Cloud not activated —</span><button onClick={()=>setModalCloudSetup(true)} style={{background:"linear-gradient(135deg,#d97706,#92400e)",border:"none",borderRadius:5,color:"#fff",fontSize:10,padding:"2px 10px",cursor:"pointer",fontFamily:"'Bebas Neue',sans-serif",letterSpacing:1}}>ACTIVATE NOW</button></>}
        {cloudReady && cloudStatus==="syncing" && <span style={{color:C.accent}}>⏳ Syncing to cloud…</span>}
        {cloudReady && cloudStatus==="synced"  && <span style={{color:"#4ade80"}}>☁️ Cloud synced — all shared links updated</span>}
        {cloudReady && cloudStatus==="error"   && <span style={{color:"#f87171"}}>⚠️ Sync failed — <button onClick={()=>{ cloudPush({assocName,assocSeason,assocLogo,teams,stats,players,matches,scorers}).then(ok=>setCloudStatus(ok?"synced":"error")); setCloudStatus("syncing"); }} style={{background:"none",border:"none",color:"#fb923c",cursor:"pointer",fontSize:11,textDecoration:"underline",padding:0,fontFamily:"inherit"}}>retry</button></span>}
        {cloudReady && cloudStatus==="idle"    && <span style={{color:C.muted}}>Changes save automatically</span>}
      </div>}

      {/* HEADER */}
      <header style={css.hdr}>
        <div style={css.hdrIn}>
          {/* Assoc Logo */}
          <div style={{position:"relative",flexShrink:0,cursor:isAdmin&&!isViewer?"pointer":"default"}} onClick={()=>isAdmin&&!isViewer&&setModalAssoc(true)} title={isAdmin&&!isViewer?"Edit association":""}> 
            {assocLogo
              ? <img src={assocLogo} alt={assocName} style={{width:46,height:46,borderRadius:12,objectFit:"cover",border:`2px solid ${C.green}44`,boxShadow:`0 0 18px ${C.greenDim}55`}}/>
              : <div style={{width:46,height:46,borderRadius:12,background:`linear-gradient(135deg,${C.greenDim},#166534)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0,boxShadow:`0 0 18px ${C.greenDim}55`}}>⚽</div>}
            {isAdmin&&!isViewer&&<div style={{position:"absolute",bottom:-3,right:-3,width:16,height:16,borderRadius:"50%",background:C.greenDim,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,color:"#fff"}}>✏️</div>}
          </div>
          <div style={{flex:1,minWidth:0}}>

              {k:"fixtures", l:"⚽ Fixtures"},
              {k:"awards",   l:"🏅 Awards"},
              {k:"lineup",   l:"📋 Lineup"},
              {k:"teams",    l:"👥 Teams"},
              {k:"print",    l:"🖨️ Print"},

              ? <button className="hov" style={{...btn("g"),padding:"7px 12px",fontSize:12}} onClick={()=>{setIsAdmin(false);toast("Logged out.","ok");}}>🔓 Logout</button>
              : <button className="hov" style={{...btn("g"),padding:"7px 12px",fontSize:12}} onClick={()=>setShowLogin(true)}>🔐 Admin</button>
            )}
          </nav>
        </div>
      </header>

      <main style={css.main}>

        {/* ══ TABLE ══════════════════════════════════════════════════ */}
        {tab==="table" && (
          <div>
            <div style={css.title}>League Standings</div>
            <div style={css.sub}>{assocName} · {assocSeason} Season · {teams.length} Clubs</div>
            <div style={css.card}>
              <div style={{overflowX:"auto"}}>
                <table style={css.tbl}>
                  <thead>
                    <tr>
                      {["#","Club","MP","W","D","L","GF","GA","GD","-Pts","PTS"].map((h,i)=>(
                        <th key={i} style={i<=1?{...css.thL,minWidth:i===1?180:40}:css.th}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {table.map((t,i)=>(
                      <tr key={t.id} style={{background:i<3?`${t.color}09`:"transparent"}}>
                        <td style={css.tdL}><div style={pos3(i+1)}>{i+1}</div></td>
                        <td style={css.tdL}>
                          <div style={{display:"flex",alignItems:"center",gap:9}}>
                            <TeamLogo logo={t.logo} name={t.name} color={t.color} size={28}/>
                            <div>
                              <div style={{fontFamily:"'Bebas Neue',sans-serif",color:t.color,fontSize:14,letterSpacing:.5}}>{t.name}</div>
                              <div style={{fontSize:10,color:C.muted}}>{t.shortName}</div>
                            </div>
                          </div>
                        </td>
                        <td style={css.td}>{t.played}</td>
                        <td style={{...css.td,color:"#4ade80"}}>{t.won}</td>
                        <td style={css.td}>{t.drawn}</td>
                        <td style={{...css.td,color:"#f87171"}}>{t.lost}</td>
                        <td style={css.td}>{t.goalsFor}</td>
                        <td style={css.td}>{t.goalsAgainst}</td>
                        <td style={{...css.td,color:t.gd>0?"#4ade80":t.gd<0?"#f87171":C.muted}}>{t.gd>0?`+${t.gd}`:t.gd}</td>
                        <td style={{...css.td,color:t.pointsDeducted>0?"#f87171":C.muted}}>{t.pointsDeducted>0?`-${t.pointsDeducted}`:"—"}</td>
                        <td style={{...css.td,fontFamily:"'Bebas Neue',sans-serif",fontSize:20,color:C.accent}}>{t.pts}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              <div style={{marginTop:14,display:"flex",gap:10,flexWrap:"wrap"}}>
                {["MP=Played","W=Won","D=Drawn","L=Lost","GF=Goals For","GA=Goals Against","GD=Diff","-Pts=Deducted","PTS=Total"].map(l=>(
                  <span key={l} style={{padding:"3px 8px",background:"#0a160c",borderRadius:5,fontSize:10,color:C.muted}}>{l}</span>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* ══ FIXTURES ════════════════════════════════════════════════ */}
        {tab==="fixtures" && (
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:16,flexWrap:"wrap",gap:10}}>
              <div><div style={css.title}>Fixtures & Results</div><div style={css.sub}>{assocSeason} · All Rounds</div></div>
              {isAdmin && <button className="hov" style={btn()} onClick={()=>setModalAddMatch(true)}>+ Add Match</button>}
            </div>
            <div style={{display:"flex",gap:7,marginBottom:18}}>
              {[["all","All"],["played","Results"],["upcoming","Upcoming"]].map(([v,l])=>(
                <button key={v} onClick={()=>setMatchFilter(v)} style={{...tabPill(matchFilter===v),padding:"6px 14px",fontSize:12}}>{l}</button>
              ))}
            </div>
            {[...new Set(filteredMatches.map(m=>m.round))].sort((a,b)=>a-b).map(round=>(
              <div key={round} style={{marginBottom:20}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:9}}>
                  <div style={{height:1,flex:1,background:C.border}}/>
                  <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:12,letterSpacing:2,color:C.muted}}>ROUND {round}</span>
                  <div style={{height:1,flex:1,background:C.border}}/>
                </div>
                {filteredMatches.filter(m=>m.round===round).map(m=>{
                  const H=teams.find(t=>t.id===m.homeTeamId), A=teams.find(t=>t.id===m.awayTeamId);
                  if(!H||!A) return null;
                  const HW=m.played&&m.homeScore>m.awayScore, AW=m.played&&m.awayScore>m.homeScore;
                  return (
                    <div key={m.id} style={{...css.card,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",padding:"14px 16px",marginBottom:8}}>
                      <div style={{flex:1,display:"flex",alignItems:"center",gap:8,justifyContent:"flex-end",minWidth:120}}>
                        <div style={{textAlign:"right"}}>
                          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:15,color:HW?H.color:C.text,letterSpacing:.5}}>{H.name}</div>
                          <div style={{fontSize:10,color:C.muted}}>{H.shortName}</div>
                        </div>
                        <TeamLogo logo={H.logo} name={H.name} color={H.color} size={32}/>
                      </div>
                      <div style={{textAlign:"center",minWidth:90}}>
                        {m.played
                          ? <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,color:C.accent,letterSpacing:4}}>{m.homeScore} — {m.awayScore}</div>
                          : <><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:17,color:C.green,letterSpacing:2}}>VS</div><div style={{fontSize:10,color:C.muted}}>{m.date}</div></>}
                        {m.played && <div style={{fontSize:10,color:C.muted}}>{m.date}</div>}
                      </div>
                      <div style={{flex:1,display:"flex",alignItems:"center",gap:8,minWidth:120}}>
                        <TeamLogo logo={A.logo} name={A.name} color={A.color} size={32}/>
                        <div>
                          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:15,color:AW?A.color:C.text,letterSpacing:.5}}>{A.name}</div>
                          <div style={{fontSize:10,color:C.muted}}>{A.shortName}</div>
                        </div>
                      </div>
                      <span className="score-badge" style={{background:m.played?"#052e16":"#0c1a0e",color:m.played?C.green:C.muted,border:`1px solid ${m.played?C.greenDim:C.border}`}}>{m.played?"FT":"SOON"}</span>
                      {isAdmin && <button style={{...btn("d"),padding:"4px 8px",fontSize:13,marginLeft:4}} onClick={()=>removeMatch(m.id)}>×</button>}
                    </div>
                  );
                })}
              </div>
            ))}
            {filteredMatches.length===0 && <div style={{...css.card,textAlign:"center",padding:40,color:C.muted}}>No matches found.</div>}
          </div>
        )}

        {/* ══ AWARDS ══════════════════════════════════════════════════ */}
        {tab==="awards" && (
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:16,flexWrap:"wrap",gap:10}}>
              <div><div style={css.title}>Awards & Stats</div><div style={css.sub}>Player performance · 2025/26</div></div>
              {isAdmin && <button className="hov" style={btn()} onClick={()=>setModalAddScorer(true)}>+ Add Stats</button>}
            </div>
            {scorers.length>0 && (
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(190px,1fr))",gap:12,marginBottom:22}}>
                {[
                  {label:"Golden Boot",icon:"🥇",color:"#d97706",key:"goals",   unit:"goals",  topFn:a=>b=>b.goals-a.goals},
                  {label:"Playmaker",  icon:"🎯",color:"#3b82f6",key:"assists", unit:"assists", topFn:a=>b=>b.assists-a.assists},
                  {label:"Iron Man",   icon:"💪",color:"#22c55e",key:"combined",unit:"G+A",     topFn:a=>b=>(b.goals+b.assists)-(a.goals+a.assists)},
                ].map(aw=>{
                  const top=[...scorers].sort((a,b)=>aw.topFn(a)(b))[0];
                  const tm=top?teams.find(t=>t.id===top.teamId):null;
                  return (
                    <div key={aw.label} style={{background:`linear-gradient(135deg,${aw.color}0f,${C.bg})`,border:`1px solid ${aw.color}33`,borderRadius:14,padding:16,textAlign:"center"}}>
                      <div style={{fontSize:26,marginBottom:6}}>{aw.icon}</div>
                      <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:11,letterSpacing:2,color:aw.color,marginBottom:6}}>{aw.label}</div>
                      {top?<>
                        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:15,color:C.text,marginBottom:2}}>{top.playerName}</div>
                        <div style={{fontSize:11,color:C.muted,marginBottom:7}}>{tm?.name}</div>
                        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:26,color:aw.color}}>{aw.key==="combined"?top.goals+top.assists:top[aw.key]}</div>
                        <div style={{fontSize:10,color:C.muted}}>{aw.unit}</div>
                      </>:<div style={{color:C.muted,fontSize:12}}>No data</div>}
                    </div>
                  );
                })}
              </div>
            )}
            <div style={{display:"flex",gap:7,marginBottom:14}}>
              {[["goals","⚽ Goals"],["assists","🎯 Assists"],["cards","🟨 Cards"]].map(([k,l])=>(
                <button key={k} style={tabPill(scorerSort===k)} onClick={()=>setScorerSort(k)}>{l}</button>
              ))}
            </div>
            <div style={css.card}>
              <table style={css.tbl}>
                <thead><tr>
                  <th style={{...css.th,width:36}}>#</th>
                  <th style={css.thL}>Player</th>
                  <th style={css.thL}>Club</th>
                  <th style={css.th}>⚽</th><th style={css.th}>🎯</th><th style={css.th}>🟨</th><th style={css.th}>🟥</th>
                  {isAdmin&&<th style={css.th}></th>}
                </tr></thead>
                <tbody>
                  {sortedScorers.map((s,i)=>{
                    const tm=teams.find(t=>t.id===s.teamId);
                    return (
                      <tr key={s.id}>
                        <td style={css.td}>{i<3?<div style={pos3(i+1)}>{i+1}</div>:<span style={{color:C.muted}}>{i+1}</span>}</td>
                        <td style={css.tdL}><span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:14,letterSpacing:.5}}>{s.playerName}</span></td>
                        <td style={css.tdL}><div style={{display:"flex",alignItems:"center",gap:7}}>{tm&&<TeamLogo logo={tm.logo} name={tm.name} color={tm.color} size={20}/>}<span style={{fontSize:11,color:tm?.color||C.muted}}>{tm?.shortName}</span></div></td>
                        <td style={{...css.td,fontFamily:"'Bebas Neue',sans-serif",fontSize:17,color:scorerSort==="goals"?C.accent:C.text}}>{s.goals}</td>
                        <td style={{...css.td,fontFamily:"'Bebas Neue',sans-serif",fontSize:17,color:scorerSort==="assists"?"#3b82f6":C.text}}>{s.assists}</td>
                        <td style={{...css.td,color:"#eab308"}}>{s.yellowCards}</td>
                        <td style={{...css.td,color:"#ef4444"}}>{s.redCards}</td>
                        {isAdmin&&<td style={css.td}><button style={{...btn("d"),padding:"3px 8px",fontSize:12}} onClick={()=>removeScorer(s.id)}>×</button></td>}
                      </tr>
                    );
                  })}
                </tbody>
              </table>
              {sortedScorers.length===0&&<div style={{textAlign:"center",padding:24,color:C.muted}}>No stats yet.</div>}
            </div>
          </div>
        )}

        {/* ══ LINEUP ══════════════════════════════════════════════════ */}
        {tab==="lineup" && (
          <div>
            <div style={css.title}>Match Day Lineup</div>
            <div style={css.sub}>Build your starting XI on the pitch</div>
            <div style={{display:"flex",gap:10,marginBottom:18,flexWrap:"wrap",alignItems:"flex-end"}}>
              <div>
                <div style={css.lbl}>Team</div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {teams.map(t=>(
                    <button key={t.id} style={tabPill(luTeamId===t.id,t.color)} className="hov" onClick={()=>{setLuTeamId(t.id);setLineup({});}}>
                      <TeamLogo logo={t.logo} name={t.name} color={t.color} size={18}/>{t.shortName}
                    </button>
                  ))}
                </div>
              </div>
              <div>
                <div style={css.lbl}>Formation</div>
                <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                  {FORMATIONS.map(f=>(
                    <button key={f} style={tabPill(luForm===f,luTeam?.color||C.green)} className="hov" onClick={()=>{setLuForm(f);setLineup({});}}>{f}</button>
                  ))}
                </div>
              </div>
              <button className="hov" style={{...btn("g"),marginTop:16}} onClick={()=>setLineup({})}>🔄 Clear</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 250px",gap:16,alignItems:"start"}}>
              <div style={{position:"relative",paddingBottom:"140%",background:"linear-gradient(180deg,#082010,#0a2a14 30%,#082010 60%,#0a2a14 100%)",borderRadius:16,border:`2px solid ${luTeam?.color||C.green}44`,overflow:"hidden",boxShadow:"0 0 32px #00000066"}}>
                <svg style={{position:"absolute",inset:0,width:"100%",height:"100%"}} viewBox="0 0 100 140" preserveAspectRatio="none">
                  {[0,1,2,3,4,5,6].map(i=><rect key={i} x="0" y={i*20} width="100" height="10" fill={i%2===0?"rgba(255,255,255,0.018)":"transparent"}/>)}
                  <rect x="5" y="4" width="90" height="132" fill="none" stroke="rgba(255,255,255,0.12)" strokeWidth="0.5"/>
                  <line x1="5" y1="70" x2="95" y2="70" stroke="rgba(255,255,255,0.12)" strokeWidth="0.5"/>
                  <circle cx="50" cy="70" r="12" fill="none" stroke="rgba(255,255,255,0.12)" strokeWidth="0.5"/>
                  <circle cx="50" cy="70" r="0.8" fill="rgba(255,255,255,0.25)"/>
                  <rect x="25" y="4" width="50" height="22" fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth="0.5"/>
                  <rect x="35" y="4" width="30" height="10" fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth="0.5"/>
                  <rect x="25" y="114" width="50" height="22" fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth="0.5"/>
                  <rect x="35" y="126" width="30" height="10" fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth="0.5"/>
                </svg>
                {fSlots.map((sl,idx)=>{
                  const pid=lineup[idx], pl=luPlayers.find(p=>p.id===pid), color=luTeam?.color||C.green;
                  return (
                    <div key={idx} style={{position:"absolute",left:`${sl.x}%`,top:`${sl.y}%`,transform:"translate(-50%,-50%)",textAlign:"center",zIndex:10,cursor:"pointer"}} className="hov"
                      onClick={()=>{
                        const taken=Object.values(lineup), avail=luPlayers.filter(p=>!taken.includes(p.id)||p.id===pid);
                        if(!pl){if(avail.length>0)assignSlot(idx,avail[0].id);}
                        else{const ci=avail.findIndex(p=>p.id===pl.id);const nx=avail[ci+1];assignSlot(idx,nx?nx.id:undefined);}
                      }}>
                      <div style={{width:44,height:44,borderRadius:"50%",background:pl?`linear-gradient(135deg,${color}cc,${color}55)`:"rgba(0,0,0,0.5)",border:`2px solid ${pl?color:"rgba(255,255,255,0.15)"}`,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto",boxShadow:pl?`0 0 14px ${color}55`:"none",overflow:"hidden",transition:"all .15s"}}>
                        {pl?.photo
                          ? <img src={pl.photo} alt={pl.name} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                          : pl ? <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:11,color:"#fff",letterSpacing:.5}}>{initials(pl.name)}</span>
                               : <span style={{fontSize:12,color:"rgba(255,255,255,0.2)"}}>+</span>}
                      </div>
                      <div style={{marginTop:3}}>
                        <span style={{fontSize:8,fontFamily:"'Bebas Neue',sans-serif",color:pl?"#fff":"rgba(255,255,255,0.2)",background:pl?`${color}cc`:"rgba(0,0,0,0.55)",padding:"1px 5px",borderRadius:4,display:"inline-block",maxWidth:55,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",letterSpacing:.5}}>
                          {pl?pl.name.split(" ")[0]:sl.s}
                        </span>
                      </div>
                    </div>
                  );
                })}
                <div style={{position:"absolute",top:7,left:"50%",transform:"translateX(-50%)",fontFamily:"'Bebas Neue',sans-serif",fontSize:11,letterSpacing:2,color:"rgba(255,255,255,0.2)",zIndex:20}}>{luForm}</div>
              </div>
              <div>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:12,letterSpacing:2,color:C.green,marginBottom:10}}>SQUAD ({luPlayers.length})</div>
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {luPlayers.length===0
                    ? <div style={{color:C.muted,fontSize:12,padding:16,textAlign:"center"}}>No players in squad.</div>
                    : luPlayers.map(p=>{
                        const inLU=Object.values(lineup).includes(p.id);
                        return (
                          <div key={p.id} style={{background:inLU?`${luTeam?.color||C.green}18`:C.card,border:`1px solid ${inLU?luTeam?.color||C.green:C.border}`,borderRadius:8,padding:"8px 10px",display:"flex",alignItems:"center",gap:8,opacity:inLU?1:0.55,transition:"all .18s"}}>
                            <PlayerAvatar photo={p.photo} name={p.name} color={luTeam?.color||C.green} size={28}/>
                            <div style={{flex:1,minWidth:0}}>
                              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:12,color:inLU?C.text:C.muted,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.name}</div>
                              <div style={{fontSize:9,color:C.muted}}>{p.position}</div>
                            </div>
                            {inLU&&<div style={{width:7,height:7,borderRadius:"50%",background:luTeam?.color||C.green,flexShrink:0}}/>}
                          </div>
                        );
                      })}
                </div>
                <div style={{marginTop:10,fontSize:10,color:C.muted}}>Tap a pitch slot to assign players.</div>
                <div style={{marginTop:5,fontFamily:"'Bebas Neue',sans-serif",fontSize:13,color:C.green,letterSpacing:1}}>{Object.keys(lineup).length}/11 selected</div>
              </div>
            </div>
          </div>
        )}

        {/* ══ TEAMS ══════════════════════════════════════════════════ */}
        {tab==="teams" && (
          <div>
            <div style={css.title}>Registered Teams</div>
            <div style={css.sub}>{teams.length} clubs competing in {assocSeason}</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:13}}>
              {teams.map(t=>{
                const s=stats[t.id]||{};
                const pts=(s.won||0)*3+(s.drawn||0)-(s.pointsDeducted||0);
                const pc=(players[t.id]||[]).length;
                return (
                  <div key={t.id} style={{...css.card,borderColor:t.color+"55",transition:"transform .18s",position:"relative"}} onMouseEnter={e=>e.currentTarget.style.transform="translateY(-3px)"} onMouseLeave={e=>e.currentTarget.style.transform="translateY(0)"}>
                    {isAdmin && (
                      <button className="hov" style={{position:"absolute",top:10,right:10,background:"transparent",border:`1px solid ${C.border}`,borderRadius:6,color:C.green,cursor:"pointer",fontSize:12,padding:"3px 8px",fontFamily:"'Bebas Neue',sans-serif",letterSpacing:1}} onClick={()=>setModalEditTeam({...t})}>✏️ Edit</button>
                    )}
                    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                      <TeamLogo logo={t.logo} name={t.name} color={t.color} size={50}/>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontFamily:"'Bebas Neue',sans-serif",color:t.color,fontSize:16,letterSpacing:.5,lineHeight:1.1}}>{t.name}</div>
                        <div style={{fontSize:10,color:C.muted,letterSpacing:1}}>{t.shortName}</div>
                      </div>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,textAlign:"center"}}>
                      {[["PTS",pts,C.accent],["MP",s.played||0,C.muted],["Squad",pc,C.green]].map(([l,v,c])=>(
                        <div key={l} style={{background:"#0a160c",borderRadius:7,padding:"7px 3px"}}>
                          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,color:c}}>{v}</div>
                          <div style={{fontSize:9,color:C.muted,letterSpacing:1,textTransform:"uppercase"}}>{l}</div>
                        </div>
                      ))}
                    </div>
                    {(players[t.id]||[]).length>0 && (
                      <div style={{marginTop:10,display:"flex"}}>
                        {(players[t.id]||[]).slice(0,6).map((p,i)=>(
                          <div key={p.id} style={{marginLeft:i>0?-10:0,zIndex:i}}>
                            <PlayerAvatar photo={p.photo} name={p.name} color={t.color} size={26}/>
                          </div>
                        ))}

                    <div key={t.id} className="edit-row" style={{...css.card,display:"flex",alignItems:"center",gap:14,flexWrap:"wrap",padding:"14px 16px",marginBottom:0}}>

                      <div style={{flex:1,display:"grid",gridTemplateColumns:"1fr auto auto auto auto",gap:10,alignItems:"center",minWidth:260}}>

                    </div>
