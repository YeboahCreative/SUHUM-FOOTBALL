                    return (
                      <div key={m.id} style={{...css.card,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap",padding:"12px 16px",marginBottom:0}}>
                        <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:11,color:C.muted,letterSpacing:1,minWidth:56}}>RD {m.round}</span>
                        <div style={{flex:1,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",minWidth:200}}>
                          <TeamLogo logo={H.logo} name={H.name} color={H.color} size={26}/><span style={{fontFamily:"'Bebas Neue',sans-serif",color:H.color,fontSize:13}}>{H.shortName}</span>
                          <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:16,color:m.played?C.accent:C.muted,letterSpacing:2,margin:"0 4px"}}>{m.played?`${m.homeScore} — ${m.awayScore}`:"VS"}</span>
                          <span style={{fontFamily:"'Bebas Neue',sans-serif",color:A.color,fontSize:13}}>{A.shortName}</span><TeamLogo logo={A.logo} name={A.name} color={A.color} size={26}/>
                        </div>
                        <span style={{fontSize:11,color:C.muted}}>{m.date}</span>
                        <span className="score-badge" style={{background:m.played?"#052e16":"#0c1a0e",color:m.played?C.green:C.muted,border:`1px solid ${m.played?C.greenDim:C.border}`}}>{m.played?"FT":"SOON"}</span>
                        <button style={{...btn("d"),padding:"4px 8px",fontSize:12}} onClick={()=>removeMatch(m.id)}>🗑</button>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* ─ EDIT SCORERS */}
            {editSection==="scorers" && (
              <div>
                <div style={{display:"flex",justifyContent:"flex-end",marginBottom:14}}>
                  <button className="hov" style={btn()} onClick={()=>setModalAddScorer(true)}>+ Add Stats</button>
                </div>
                <div style={css.card}>
                  <table style={css.tbl}>
                    <thead><tr>
                      <th style={css.thL}>Player</th><th style={css.thL}>Club</th>
                      <th style={css.th}>⚽</th><th style={css.th}>🎯</th><th style={css.th}>🟨</th><th style={css.th}>🟥</th><th style={css.th}></th>
                    </tr></thead>
                    <tbody>
                      {scorers.map(s=>{
                        const tm=teams.find(t=>t.id===s.teamId);
                        return (
                          <tr key={s.id}>
                            <td style={css.tdL}><span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:13}}>{s.playerName}</span></td>
                            <td style={css.tdL}><div style={{display:"flex",alignItems:"center",gap:6}}>{tm&&<TeamLogo logo={tm.logo} name={tm.name} color={tm.color} size={20}/>}<span style={{fontSize:11,color:tm?.color||C.muted}}>{tm?.shortName}</span></div></td>
                            <td style={css.td}>{s.goals}</td><td style={css.td}>{s.assists}</td>
                            <td style={{...css.td,color:"#eab308"}}>{s.yellowCards}</td>
                            <td style={{...css.td,color:"#ef4444"}}>{s.redCards}</td>
                            <td style={css.td}><button style={{...btn("d"),padding:"3px 7px",fontSize:11}} onClick={()=>removeScorer(s.id)}>🗑</button></td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                  {scorers.length===0&&<div style={{textAlign:"center",padding:20,color:C.muted}}>No stats yet.</div>}
                </div>
              </div>
            )}
          </div>
        )}

      </main>

      {/* ═══════════════════ MODALS ═══════════════════ */}

      {/* LOGIN */}
      {showLogin && (
        <div style={css.modal} onClick={e=>e.target===e.currentTarget&&(setShowLogin(false),setLoginErr(""),setLoginInput(""))}>
          <div style={css.mbox}>
            <div style={{textAlign:"center",marginBottom:22}}>
              <div style={{fontSize:40,marginBottom:8}}>🔐</div>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:24,color:C.green,letterSpacing:2}}>Admin Login</div>
              <div style={{fontSize:12,color:C.muted,marginTop:4}}>Enter your admin password to unlock editing</div>
            </div>
            <div style={css.lbl}>Password</div>
            <input type="password" placeholder="••••" style={{...css.inp,letterSpacing:6,fontSize:20,textAlign:"center",marginBottom:6}} value={loginInput} onChange={e=>setLoginInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doLogin()}/>
            {loginErr && <div style={{color:"#f87171",fontSize:12,marginBottom:8,textAlign:"center"}}>⚠️ {loginErr}</div>}
            <div style={{display:"flex",gap:10,marginTop:14}}>
              <button className="hov" style={{...btn(),flex:1}} onClick={doLogin}>Login</button>
              <button className="hov" style={{...btn("g"),flex:1}} onClick={()=>{setShowLogin(false);setLoginErr("");setLoginInput("");}}>Cancel</button>
            </div>
            <div style={{marginTop:14,textAlign:"center",fontSize:11,color:C.muted}}>Default password: <span style={{color:C.green,fontFamily:"'Bebas Neue',sans-serif",letterSpacing:3,fontSize:14}}>0000</span></div>
          </div>
        </div>
      )}

      {/* CHANGE PASSWORD */}
      {showPwChange && (
        <div style={css.modal} onClick={e=>e.target===e.currentTarget&&setShowPwChange(false)}>
          <div style={css.mbox}>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:C.green,letterSpacing:2,marginBottom:20}}>🔑 Change Password</div>
            <div style={css.lbl}>New Password</div>
            <input type="password" style={{...css.inp,marginBottom:12}} value={pwNew} onChange={e=>setPwNew(e.target.value)}/>
            <div style={css.lbl}>Confirm Password</div>
            <input type="password" style={{...css.inp,marginBottom:6}} value={pwConfirm} onChange={e=>setPwConfirm(e.target.value)}/>
            {pwErr && <div style={{color:"#f87171",fontSize:12,marginBottom:8}}>⚠️ {pwErr}</div>}
            <div style={{display:"flex",gap:10,marginTop:14}}>
              <button className="hov" style={{...btn(),flex:1}} onClick={doChangePw}>Save Password</button>
              <button className="hov" style={{...btn("g"),flex:1}} onClick={()=>{setShowPwChange(false);setPwErr("");}}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {/* SHARE */}
      {modalShare && (
        <div style={css.modal} onClick={e=>e.target===e.currentTarget&&setModalShare(false)}>
          <div style={css.mbox}>
            <div style={{textAlign:"center",marginBottom:16}}>
              <div style={{fontSize:44,marginBottom:8}}>🔗</div>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:C.green,letterSpacing:2}}>Share League</div>
              <div style={{fontSize:12,color:C.muted,marginTop:4}}>
                {cloudBinId ? <>Anyone with this link sees <strong style={{color:C.text}}>live, always-updated</strong> data</> : "Set up cloud sync to share a permanent live link"}
              </div>
            </div>

            {!cloudBinId ? (
              /* Cloud not yet set up */
              <div style={{background:"#1a0a00",border:"1px solid #d9770655",borderRadius:10,padding:"16px",marginBottom:14,textAlign:"center"}}>
                <div style={{fontSize:32,marginBottom:8}}>☁️</div>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:16,color:"#fb923c",letterSpacing:1,marginBottom:8}}>Cloud Sync Not Set Up</div>
                <div style={{fontSize:12,color:C.muted,marginBottom:14,lineHeight:1.7}}>
                  Activate cloud sync to get a <strong style={{color:C.text}}>single permanent link</strong> for Suhum FA that auto-updates whenever you make changes — online or offline.
                </div>
                <button className="hov" style={{...btn(),width:"100%",fontSize:14,padding:"12px"}} onClick={()=>{setModalShare(false);setModalCloudSetup(true);}}>
                  ☁️ Activate Cloud Sync (Free)
                </button>
              </div>
            ) : (
              <>
                {/* Permanent Public Link Box */}
                <div style={{background:"#052e16",border:`1px solid ${C.green}44`,borderRadius:10,padding:"12px 14px",marginBottom:12}}>
                  <div style={{fontSize:10,fontFamily:"'Bebas Neue',sans-serif",letterSpacing:2,color:C.green,marginBottom:6}}>🏆 SUHUM FOOTBALL ASSOCIATION — PERMANENT LINK</div>
                  <div style={{fontSize:11,color:"#86efac",wordBreak:"break-all",fontFamily:"monospace",background:"#0a160c",padding:"8px 10px",borderRadius:6,marginBottom:8,userSelect:"all"}}>
                    {getPublicLink()}
                  </div>
                  <div style={{fontSize:10,color:C.muted}}>✅ This link <strong style={{color:C.green}}>never changes</strong> — share once, always shows latest data</div>
                </div>

                {/* Cloud sync status */}
                <div style={{background:"#0a160c",border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:11,color:C.muted,display:"flex",alignItems:"center",gap:8}}>
                  {cloudStatus==="synced"  && <><span style={{color:"#4ade80"}}>🟢</span> Cloud live — all viewers see your latest changes</>}
                  {cloudStatus==="syncing" && <><span style={{color:C.accent}}>⏳</span> Syncing to cloud…</>}
                  {cloudStatus==="error"   && <><span style={{color:"#f87171"}}>⚠️</span> Cloud sync failed — try pushing manually</>}
                  {cloudStatus==="idle"    && <><span>☁️</span> Make a change as admin to push to cloud</>}
                </div>

                {cloudStatus==="error" && (
                  <button className="hov" style={{...btn(),width:"100%",fontSize:13,padding:"10px",marginBottom:8}} onClick={()=>{ setCloudStatus("syncing"); cloudPush({assocName,assocSeason,assocLogo,teams,stats,players,matches,scorers}).then(ok=>setCloudStatus(ok?"synced":"error")); }}>
                    ☁️ Push to Cloud Now
                  </button>
                )}

                {/* Big share button */}
                <button className="hov" style={{...btn(),width:"100%",fontSize:15,padding:"13px 18px",marginBottom:8,display:"flex",alignItems:"center",justifyContent:"center",gap:10}} onClick={doShare}>
                  <span style={{fontSize:18}}>📤</span> {typeof navigator!=="undefined"&&navigator.share?"Share via App…":"Copy Link"}
                </button>

                {/* Social share buttons */}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,marginBottom:10}}>
                  {[
                    {icon:"💬",label:"WhatsApp",  color:"#25D366", fn:()=>{ const l=getPublicLink(); window.open("https://wa.me/?text="+encodeURIComponent("⚽ "+assocName+" – "+assocSeason+" Live League\n"+l),"_blank"); }},
                    {icon:"🐦",label:"Twitter/X", color:"#1DA1F2", fn:()=>{ const l=getPublicLink(); window.open("https://twitter.com/intent/tweet?text="+encodeURIComponent("⚽ "+assocName+" "+assocSeason+" live table!")+"&url="+encodeURIComponent(l),"_blank"); }},
                    {icon:"📘",label:"Facebook",  color:"#1877F2", fn:()=>{ const l=getPublicLink(); window.open("https://www.facebook.com/sharer/sharer.php?u="+encodeURIComponent(l),"_blank"); }},
                  ].map(({icon,label,color,fn})=>(
                    <button key={label} className="hov" style={{background:"transparent",border:`1px solid ${color}55`,borderRadius:8,padding:"9px 6px",cursor:"pointer",color,fontSize:11,fontFamily:"'Bebas Neue',sans-serif",letterSpacing:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4,transition:"all .18s"}} onClick={fn}>
                      <span style={{fontSize:20}}>{icon}</span>{label}
                    </button>
                  ))}
                </div>

                <button className="hov" style={{...btn("g"),width:"100%",fontSize:12,padding:"9px",marginBottom:8,display:"flex",alignItems:"center",justifyContent:"center",gap:7}} onClick={copyLink}>
                  <span>📋</span> Copy Link to Clipboard
                </button>
                {copyOk && <div style={{textAlign:"center",color:C.green,fontSize:13,marginBottom:8,fontWeight:600}}>✅ Link copied!</div>}
              </>
            )}

            {isAdmin && (
              <div style={{borderTop:`1px solid ${C.border}`,paddingTop:14,display:"flex",gap:9}}>
                <button className="hov" style={{...btn("o"),flex:1,fontSize:12}} onClick={()=>{setModalShare(false);setShowPwChange(true);}}>🔑 Change Password</button>
                <button className="hov" style={{...btn("g"),flex:1,fontSize:12}} onClick={()=>setModalShare(false)}>Close</button>
              </div>
            )}
            {!isAdmin && <button className="hov" style={{...btn("g"),width:"100%"}} onClick={()=>setModalShare(false)}>Close</button>}
          </div>
        </div>
      )}

      {/* CLOUD SETUP MODAL */}
      {modalCloudSetup && (
        <div style={css.modal} onClick={e=>e.target===e.currentTarget&&(setModalCloudSetup(false),setCloudSetupStep("idle"))}>
          <div style={css.mbox}>
            <div style={{textAlign:"center",marginBottom:20}}>
              <div style={{fontSize:48,marginBottom:8}}>☁️</div>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:C.green,letterSpacing:2}}>Activate Cloud Sync</div>
              <div style={{fontSize:12,color:C.muted,marginTop:4,lineHeight:1.7}}>Creates a free cloud database for Suhum FA so your shared link always shows the latest data — on any device, anywhere.</div>
            </div>

            {cloudSetupStep==="idle" && (
              <>
                <div style={{background:"#0a160c",borderRadius:10,border:`1px solid ${C.border}`,padding:"14px",marginBottom:16}}>
                  {[
                    ["🔄","Auto-sync","Every change you make as admin pushes to cloud instantly"],
                    ["🔗","Permanent link","Share once — link never changes or expires"],
                    ["📱","Works everywhere","Viewers see live data on any phone, laptop, or tablet"],
                  ].map(([icon,title,desc])=>(
                    <div key={title} style={{display:"flex",gap:12,marginBottom:10,alignItems:"flex-start"}}>
                      <span style={{fontSize:18,flexShrink:0}}>{icon}</span>
                      <div><div style={{fontSize:12,color:C.text,fontWeight:600}}>{title}</div><div style={{fontSize:11,color:C.muted}}>{desc}</div></div>
                    </div>
                  ))}
                </div>
                <div style={{marginBottom:14}}>
                  <div style={css.lbl}>JSONBin Master Key (required)</div>
                  <input
                    type="password"
                    placeholder="$2a$10$..."
                    style={{...css.inp, fontFamily:"monospace", fontSize:12}}
                    value={cloudApiKey}
                    onChange={e=>setCloudApiKey(e.target.value)}
                  />
                  <div style={{fontSize:10,color:C.muted,marginTop:5,lineHeight:1.6}}>
                    Free account at <span style={{color:C.green}}>jsonbin.io</span> → Account → Master Key → paste here.
                  </div>
                </div>
                <button className="hov" style={{...btn(),width:"100%",fontSize:15,padding:"14px",marginBottom:8,opacity:cloudApiKey?1:0.5,cursor:cloudApiKey?"pointer":"not-allowed"}} onClick={()=>cloudApiKey&&doCloudActivate()}>
                  🚀 Activate Cloud Sync
                </button>
                <button className="hov" style={{...btn("g"),width:"100%",fontSize:12}} onClick={()=>{setModalCloudSetup(false);setCloudSetupStep("idle");}}>Cancel</button>
              </>
            )}

            {cloudSetupStep==="creating" && (
              <div style={{textAlign:"center",padding:"20px 0"}}>
                <div style={{fontSize:40,marginBottom:12,animation:"spin 1s linear infinite",display:"inline-block"}}>⏳</div>
                <div style={{color:C.green,fontFamily:"'Bebas Neue',sans-serif",fontSize:16,letterSpacing:2}}>Creating cloud database…</div>
                <div style={{color:C.muted,fontSize:12,marginTop:6}}>This takes a few seconds</div>
              </div>
            )}

            {cloudSetupStep==="done" && (
              <div style={{textAlign:"center",padding:"10px 0"}}>
                <div style={{fontSize:48,marginBottom:12}}>🎉</div>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,color:C.green,letterSpacing:2,marginBottom:8}}>Cloud Sync Active!</div>
                <div style={{background:"#052e16",border:`1px solid ${C.green}44`,borderRadius:10,padding:"12px",marginBottom:14}}>
                  <div style={{fontSize:10,fontFamily:"'Bebas Neue',sans-serif",letterSpacing:2,color:C.green,marginBottom:6}}>YOUR PERMANENT LINK</div>
                  <div style={{fontSize:11,color:"#86efac",wordBreak:"break-all",fontFamily:"monospace",background:"#0a160c",padding:"8px",borderRadius:6,userSelect:"all"}}>
                    {getPublicLink()}
                  </div>
                </div>
                <div style={{fontSize:11,color:C.muted,marginBottom:16,lineHeight:1.7}}>
                  Share this link with players, fans, and officials. It will always show the latest league data whenever you update it as admin.
                </div>
                <button className="hov" style={{...btn(),width:"100%",fontSize:14,padding:"12px",marginBottom:8}} onClick={()=>{ navigator.clipboard.writeText(getPublicLink()||""); setCopyOk(true); toast("Link copied!"); }}>
                  📋 Copy Link
                </button>
                <button className="hov" style={{...btn("g"),width:"100%",fontSize:12}} onClick={()=>{setModalCloudSetup(false);setCloudSetupStep("idle");}}>Done</button>
              </div>
            )}

            {cloudSetupStep==="fail" && (
              <div>
                <div style={{textAlign:"center",marginBottom:12}}>
                  <div style={{fontSize:40,marginBottom:10}}>⚠️</div>
                  <div style={{color:"#f87171",fontFamily:"'Bebas Neue',sans-serif",fontSize:16,letterSpacing:2,marginBottom:8}}>Activation Failed</div>
                  <div style={{color:C.muted,fontSize:12,marginBottom:12,lineHeight:1.7}}>JSONBin rejected the request — the Master Key may be missing or incorrect. Paste your key below and try again.</div>
                </div>
                <div style={{marginBottom:14}}>
                  <div style={css.lbl}>JSONBin Master Key</div>
                  <input
                    type="password"
                    placeholder="$2a$10$..."
                    style={{...css.inp, fontFamily:"monospace", fontSize:12}}
                    value={cloudApiKey}
                    onChange={e=>setCloudApiKey(e.target.value)}
                  />
                  <div style={{fontSize:10,color:C.muted,marginTop:5,lineHeight:1.6}}>
                    Free account at <span style={{color:C.green}}>jsonbin.io</span> → go to <b style={{color:C.text}}>Account → Master Key</b> → copy and paste here.
                  </div>
                </div>
                <div style={{display:"flex",gap:10}}>
                  <button className="hov" style={{...btn(),flex:1,opacity:cloudApiKey?1:0.5}} onClick={()=>{ if(cloudApiKey){setCloudSetupStep("idle");doCloudActivate();} }}>🔄 Try Again</button>
                  <button className="hov" style={{...btn("g"),flex:1,fontSize:12}} onClick={()=>{setModalCloudSetup(false);setCloudSetupStep("idle");}}>Cancel</button>
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* ASSOCIATION SETTINGS */}
      {modalAssoc && (
        <div style={css.modal} onClick={e=>e.target===e.currentTarget&&setModalAssoc(false)}>
          <div style={css.mbox}>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:C.green,letterSpacing:2,marginBottom:18}}>🏟️ Association Settings</div>
            {/* Logo upload */}
            <div className="uploadzone" style={{marginBottom:16,textAlign:"center"}} onClick={()=>pickFile("image/*",url=>setAssocLogo(url))}>
              {assocLogo
                ? <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
                    <img src={assocLogo} alt="logo" style={{width:80,height:80,borderRadius:14,objectFit:"cover",border:`2px solid ${C.green}44`}}/>
                    <span style={{fontSize:11,color:C.muted}}>Click to change logo</span>
                  </div>
                : <><div style={{fontSize:36,marginBottom:6}}>🏟️</div><div style={{fontSize:13,color:C.muted}}>Click to upload association logo</div><div style={{fontSize:10,color:C.muted,marginTop:2}}>PNG, JPG, SVG — any size</div></>}
            </div>
            {assocLogo && (
              <button className="hov" style={{...btn("d"),width:"100%",fontSize:11,padding:"6px",marginBottom:12}} onClick={()=>setAssocLogo(null)}>🗑 Remove Logo</button>
            )}
            <div style={{marginBottom:12}}>
              <div style={css.lbl}>Association Name</div>
              <input type="text" style={css.inp} value={assocName} onChange={e=>setAssocName(e.target.value)} placeholder="e.g. Suhum Municipal Football Association"/>
            </div>
            <div style={{marginBottom:20}}>
              <div style={css.lbl}>Season</div>
              <input type="text" style={css.inp} value={assocSeason} onChange={e=>setAssocSeason(e.target.value)} placeholder="e.g. 2025/26"/>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button className="hov" style={{...btn(),flex:1}} onClick={()=>{setModalAssoc(false);toast("Association updated!");}}>Save</button>
              <button className="hov" style={{...btn("g"),flex:1}} onClick={()=>setModalAssoc(false)}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {/* ADD TEAM */}
      {modalAddTeam && (
        <div style={css.modal} onClick={e=>e.target===e.currentTarget&&setModalAddTeam(false)}>
          <div style={css.mbox}>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:C.green,letterSpacing:2,marginBottom:18}}>Add New Team</div>
            <div className="uploadzone" style={{marginBottom:16}} onClick={()=>pickFile("image/*",url=>setNewTeam(t=>({...t,logo:url})))}>
              {newTeam.logo
                ? <div style={{display:"flex",justifyContent:"center"}}><TeamLogo logo={newTeam.logo} name={newTeam.name||"NEW"} color={newTeam.color} size={70}/></div>
                : <><div style={{fontSize:28,marginBottom:6}}>🏟️</div><div style={{fontSize:12,color:C.muted}}>Click to upload team crest / logo</div><div style={{fontSize:10,color:C.muted,marginTop:2}}>JPG, PNG, SVG — any size</div></>}
            </div>
            {[["Full Team Name *","name","e.g. Suhum FC Warriors"],["Short Name (max 4) *","shortName","e.g. SFW"]].map(([l,f,ph])=>(
              <div key={f} style={{marginBottom:12}}>
                <div style={css.lbl}>{l}</div>
                <input type="text" placeholder={ph} maxLength={f==="shortName"?4:60} style={css.inp} value={newTeam[f]} onChange={e=>setNewTeam(t=>({...t,[f]:f==="shortName"?e.target.value.toUpperCase():e.target.value}))}/>
              </div>
            ))}
            <div style={{marginBottom:18}}>
              <div style={css.lbl}>Team Color</div>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <input type="color" value={newTeam.color} onChange={e=>setNewTeam(t=>({...t,color:e.target.value}))}/>
                <div style={{width:32,height:32,borderRadius:8,background:newTeam.color,border:`2px solid ${newTeam.color}88`}}/>
                <span style={{fontSize:12,color:newTeam.color,fontFamily:"'Bebas Neue',sans-serif"}}>{newTeam.color.toUpperCase()}</span>
              </div>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button className="hov" style={{...btn(),flex:1}} onClick={addTeam}>Add Team</button>
              <button className="hov" style={{...btn("g"),flex:1}} onClick={()=>setModalAddTeam(false)}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {/* EDIT TEAM MODAL */}
      {modalEditTeam && (
        <div style={css.modal} onClick={e=>e.target===e.currentTarget&&setModalEditTeam(null)}>
          <div style={css.mbox}>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:C.green,letterSpacing:2,marginBottom:18}}>Edit Team</div>
            {/* Logo upload */}
            <div className="uploadzone" style={{marginBottom:16}} onClick={()=>pickFile("image/*",url=>setModalEditTeam(t=>({...t,logo:url})))}>
              {modalEditTeam.logo
                ? <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
                    <TeamLogo logo={modalEditTeam.logo} name={modalEditTeam.name} color={modalEditTeam.color} size={70}/>
                    <span style={{fontSize:11,color:C.muted}}>Click to change logo</span>
                  </div>
                : <><div style={{fontSize:28,marginBottom:6}}>🏟️</div><div style={{fontSize:12,color:C.muted}}>Click to upload team crest / logo</div></>}
            </div>
            {[["Full Team Name","name"],["Short Name (max 4)","shortName"]].map(([l,f])=>(
              <div key={f} style={{marginBottom:12}}>
                <div style={css.lbl}>{l}</div>
                <input type="text" maxLength={f==="shortName"?4:60} style={css.inp} value={modalEditTeam[f]} onChange={e=>setModalEditTeam(t=>({...t,[f]:f==="shortName"?e.target.value.toUpperCase():e.target.value}))}/>
              </div>
            ))}
            <div style={{marginBottom:18}}>
              <div style={css.lbl}>Team Color</div>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <input type="color" value={modalEditTeam.color} onChange={e=>setModalEditTeam(t=>({...t,color:e.target.value}))}/>
                <div style={{width:32,height:32,borderRadius:8,background:modalEditTeam.color,border:`2px solid ${modalEditTeam.color}88`}}/>
                <span style={{fontSize:12,color:modalEditTeam.color,fontFamily:"'Bebas Neue',sans-serif"}}>{modalEditTeam.color.toUpperCase()}</span>
              </div>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button className="hov" style={{...btn(),flex:1}} onClick={saveEditTeam}>Save Changes</button>
              <button className="hov" style={{...btn("g"),flex:1}} onClick={()=>setModalEditTeam(null)}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {/* ADD PLAYER */}
      {modalAddPlayer && (
        <div style={css.modal} onClick={e=>e.target===e.currentTarget&&setModalAddPlayer(false)}>
          <div style={css.mbox}>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:C.green,letterSpacing:2,marginBottom:18}}>Register Player</div>
            {/* Photo upload */}
            <div className="uploadzone" style={{marginBottom:14}} onClick={()=>pickFile("image/*",url=>setNewPlayer(p=>({...p,photo:url})))}>
              {newPlayer.photo
                ? <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
                    <PlayerAvatar photo={newPlayer.photo} name={newPlayer.name||"?"} color={selTeam?.color||C.green} size={70}/>
                    <span style={{fontSize:11,color:C.muted}}>Click to change photo</span>
                  </div>
                : <><div style={{fontSize:28,marginBottom:5}}>🧑‍🦱</div><div style={{fontSize:12,color:C.muted}}>Click to upload player photo</div><div style={{fontSize:10,color:C.muted,marginTop:2}}>Passport or action photo — any size</div></>}
            </div>
            {[["Full Name *","text","name","e.g. Kwame Asante"],["Age *","number","age","e.g. 23"]].map(([l,t,f,ph])=>(
              <div key={f} style={{marginBottom:12}}>
                <div style={css.lbl}>{l}</div>
                <input type={t} placeholder={ph} style={css.inp} value={newPlayer[f]} onChange={e=>setNewPlayer(p=>({...p,[f]:e.target.value}))}/>
              </div>
            ))}
            <div style={{marginBottom:18}}>
              <div style={css.lbl}>Position</div>
              <select style={css.inp} value={newPlayer.position} onChange={e=>setNewPlayer(p=>({...p,position:e.target.value}))}>
                {POSITIONS.map(pos=><option key={pos} value={pos}>{pos}</option>)}
              </select>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button className="hov" style={{...btn(),flex:1}} onClick={addPlayer}>Register</button>
              <button className="hov" style={{...btn("g"),flex:1}} onClick={()=>setModalAddPlayer(false)}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {/* EDIT PLAYER */}
      {modalEditPlayer && (
        <div style={css.modal} onClick={e=>e.target===e.currentTarget&&setModalEditPlayer(null)}>
          <div style={css.mbox}>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:C.green,letterSpacing:2,marginBottom:18}}>Edit Player</div>
            {/* Photo upload */}
            <div className="uploadzone" style={{marginBottom:14}} onClick={()=>pickFile("image/*",url=>setModalEditPlayer(p=>({...p,photo:url})))}>
              {modalEditPlayer.photo
                ? <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
                    <PlayerAvatar photo={modalEditPlayer.photo} name={modalEditPlayer.name} color={selTeam?.color||C.green} size={70}/>
                    <span style={{fontSize:11,color:C.muted}}>Click to change photo</span>
                  </div>
                : <><div style={{fontSize:28,marginBottom:5}}>🧑‍🦱</div><div style={{fontSize:12,color:C.muted}}>Click to upload / change photo</div></>}
            </div>
            {[["Full Name","name","text"],["Age","age","number"]].map(([l,f,t])=>(
              <div key={f} style={{marginBottom:12}}>
                <div style={css.lbl}>{l}</div>
                <input type={t} style={css.inp} value={modalEditPlayer[f]} onChange={e=>setModalEditPlayer(p=>({...p,[f]:e.target.value}))}/>
              </div>
            ))}
            <div style={{marginBottom:18}}>
              <div style={css.lbl}>Position</div>
              <select style={css.inp} value={modalEditPlayer.position} onChange={e=>setModalEditPlayer(p=>({...p,position:e.target.value}))}>
                {POSITIONS.map(pos=><option key={pos} value={pos}>{pos}</option>)}
              </select>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button className="hov" style={{...btn(),flex:1}} onClick={()=>{updatePlayer(modalEditPlayer.teamId,modalEditPlayer.id,modalEditPlayer);setModalEditPlayer(null);toast("Player updated!");}}>Save Changes</button>
              <button className="hov" style={{...btn("g"),flex:1}} onClick={()=>setModalEditPlayer(null)}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {/* ADD MATCH */}
      {modalAddMatch && (
        <div style={css.modal} onClick={e=>e.target===e.currentTarget&&setModalAddMatch(false)}>
          <div style={css.mbox}>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:C.green,letterSpacing:2,marginBottom:18}}>Add Match</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
              <div><div style={css.lbl}>Home</div><select style={css.inp} value={newMatch.homeTeamId} onChange={e=>setNewMatch(m=>({...m,homeTeamId:+e.target.value}))}>{teams.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}</select></div>
              <div><div style={css.lbl}>Away</div><select style={css.inp} value={newMatch.awayTeamId} onChange={e=>setNewMatch(m=>({...m,awayTeamId:+e.target.value}))}>{teams.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}</select></div>
            </div>
            <div style={{marginBottom:10}}><div style={css.lbl}>Date</div><input type="date" style={css.inp} value={newMatch.date} onChange={e=>setNewMatch(m=>({...m,date:e.target.value}))}/></div>
            <div style={{marginBottom:10}}><div style={css.lbl}>Round</div><input type="number" min="1" placeholder="e.g. 5" style={css.inp} value={newMatch.round} onChange={e=>setNewMatch(m=>({...m,round:e.target.value}))}/></div>
            <div style={{fontSize:10,color:C.muted,letterSpacing:1,fontFamily:"'Bebas Neue',sans-serif",marginBottom:8}}>Score — leave blank if upcoming</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:18}}>
              <div><div style={css.lbl}>Home Score</div><input type="number" min="0" placeholder="—" style={css.inp} value={newMatch.homeScore} onChange={e=>setNewMatch(m=>({...m,homeScore:e.target.value}))}/></div>
              <div><div style={css.lbl}>Away Score</div><input type="number" min="0" placeholder="—" style={css.inp} value={newMatch.awayScore} onChange={e=>setNewMatch(m=>({...m,awayScore:e.target.value}))}/></div>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button className="hov" style={{...btn(),flex:1}} onClick={addMatch}>Add Match</button>
              <button className="hov" style={{...btn("g"),flex:1}} onClick={()=>setModalAddMatch(false)}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {/* ADD SCORER */}
      {modalAddScorer && (
        <div style={css.modal} onClick={e=>e.target===e.currentTarget&&setModalAddScorer(false)}>
          <div style={css.mbox}>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:C.green,letterSpacing:2,marginBottom:18}}>Add Player Stats</div>
            <div style={{marginBottom:12}}><div style={css.lbl}>Team</div><select style={css.inp} value={newScorer.teamId} onChange={e=>setNewScorer(s=>({...s,teamId:+e.target.value}))}>{teams.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}</select></div>
            <div style={{marginBottom:12}}><div style={css.lbl}>Player Name</div><input type="text" placeholder="e.g. Kwame Asante" style={css.inp} value={newScorer.playerName} onChange={e=>setNewScorer(s=>({...s,playerName:e.target.value}))}/></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:18}}>
              {[["goals","Goals ⚽"],["assists","Assists 🎯"],["yellowCards","Yellow 🟨"],["redCards","Red 🟥"]].map(([f,l])=>(
                <div key={f}><div style={css.lbl}>{l}</div><input type="number" min="0" style={css.inp} value={newScorer[f]} onChange={e=>setNewScorer(s=>({...s,[f]:e.target.value}))}/></div>
              ))}
            </div>
            <div style={{display:"flex",gap:10}}>
              <button className="hov" style={{...btn(),flex:1}} onClick={addScorer}>Save</button>
              <button className="hov" style={{...btn("g"),flex:1}} onClick={()=>setModalAddScorer(false)}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {/* TOAST */}
      {notify && <div style={css.ntf(notify.type)}>{notify.type==="err"?"⚠️":"✅"} {notify.msg}</div>}

      {/* ADMIN FOOTER */}
      {isAdmin && !isViewer && (
        <div style={{background:"#0a160c",borderTop:`1px solid ${C.border}`,padding:"9px 20px",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",justifyContent:"center"}}>
          <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:11,color:C.muted,letterSpacing:2}}>ADMIN:</span>
          <button className="hov" style={{...btn("o"),fontSize:11,padding:"5px 12px"}} onClick={()=>setShowPwChange(true)}>🔑 Change Password</button>
          <button className="hov" style={{...btn("o"),fontSize:11,padding:"5px 12px"}} onClick={()=>setModalShare(true)}>🔗 Share Public Link</button>
          <button className="hov" style={{...btn("d"),fontSize:11,padding:"5px 12px"}} onClick={()=>{setIsAdmin(false);toast("Logged out.");}}>🔓 Logout</button>
        </div>
      )}
    </div>
  );
}

    // ── Render
    const container = document.getElementById("root");
    const root = ReactDOM.createRoot(container);
    root.render(React.createElement(App));
    // Hide loader
    const loader = document.getElementById("pwa-loader");
    if (loader) { loader.style.opacity = "0"; setTimeout(() => loader.remove(), 450); }
  </script>

  <!-- PWA service worker registration -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js")
          .then(r => console.log("SW registered:", r.scope))
          .catch(e => console.log("SW error:", e));
      });
    }

    // Install prompt (Android/Chrome)
    let deferredPrompt;
    window.addEventListener("beforeinstallprompt", e => {
      e.preventDefault();
      deferredPrompt = e;
      const btn = document.getElementById("install-btn");
      if (btn) btn.style.display = "flex";
    });
    window.addEventListener("appinstalled", () => {
      const btn = document.getElementById("install-btn");
      if (btn) btn.style.display = "none";
      deferredPrompt = null;
    });
    window._smfaInstall = () => {
      if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt.userChoice.then(() => { deferredPrompt = null; }); }
    };
  </script>
</body>
</html>
